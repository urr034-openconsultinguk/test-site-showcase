name: Deploy Website

on:
  push:
    branches:
      - main   # only after merge to main

jobs:
  deploy:
    # Run on your machine (self-hosted runner). This allows the workflow to
    # execute the deploy script locally without SSH.
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run deploy script
        run: |
          ./deploy.sh
